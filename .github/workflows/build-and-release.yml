name: Build and Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

# Grant write access to repository contents so the workflow can create releases
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Make build script executable
        run: chmod +x ./build.sh || true

      - name: Build package
        run: |
          set -eux
          ./check-syntax.sh || true
          ./build.sh

      - name: Get version
        id: get_version
        run: |
          VERSION=$(sed -n 's/^version=//p' module.prop)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            _builds/**/*.zip
            _builds/**/*.tgz
            bin/*.zip
            install-online.sh
            install-tarball.sh
            module.json

      - name: Create GitHub release and upload artifacts
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.get_version.outputs.version }}
          name: ${{ steps.get_version.outputs.version }}
          artifacts: packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
