name: Build and Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

# Grant write access to repository contents so the workflow can create releases
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Make build script executable
        run: chmod +x ./build.sh ./build-kbs-sleep.sh || true

      - name: Set up Android NDK
        uses: android-actions/setup-android@v3
        with:
          packages: ndk;26.1.10909125

      - name: Build sleep helpers
        shell: bash
        run: |
          set -euo pipefail
          sdk_root="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          [ -n "$sdk_root" ] || { echo "Android SDK root not available" >&2; exit 1; }
          ndk_home="$(find "$sdk_root/ndk" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          [ -n "$ndk_home" ] || { echo "Android NDK not found under $sdk_root/ndk" >&2; exit 1; }
          export ANDROID_NDK_HOME="$ndk_home"
          ./build-kbs-sleep.sh

      - name: Verify sleep helpers
        shell: bash
        run: |
          set -euo pipefail
          for file in bin/kbs-sleep.arm64-v8a bin/kbs-sleep.armeabi-v7a bin/kbs-sleep.x86_64; do
            [ -x "$file" ]
          done

      - name: Build package
        run: |
          set -eux
          sh ./check-syntax.sh || true
          ./build.sh

      - name: Verify packaged sleep helpers
        shell: bash
        run: |
          set -euo pipefail
          id="$(sed -n 's/^id=//p' module.prop)"
          version="$(sed -n 's/^version=//p' module.prop)"
          version_code="$(sed -n 's/^versionCode=//p' module.prop)"
          base="${id}_${version}_${version_code}"
          build_dir="_builds/${base}"
          zip_file="$(ls -1 "${build_dir}/${base}"*.zip | head -n 1)"
          tgz_file="${build_dir}/${base}.tgz"
          [ -f "$zip_file" ]
          [ -f "$tgz_file" ]
          unzip -l "$zip_file" | grep -F 'bin/kbs-sleep.arm64-v8a'
          unzip -l "$zip_file" | grep -F 'bin/kbs-sleep.armeabi-v7a'
          unzip -l "$zip_file" | grep -F 'bin/kbs-sleep.x86_64'
          tar -tzf "$tgz_file" | grep -F '/bin/kbs-sleep.arm64-v8a'
          tar -tzf "$tgz_file" | grep -F '/bin/kbs-sleep.armeabi-v7a'
          tar -tzf "$tgz_file" | grep -F '/bin/kbs-sleep.x86_64'

      - name: Get version
        id: get_version
        run: |
          # Prefer the pushed tag when present, otherwise fall back to module.prop
          if echo "${GITHUB_REF:-}" | grep -q '^refs/tags/'; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(sed -n 's/^version=//p' module.prop)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: ${{ steps.get_version.outputs.version }}
          body: Automated release for ${{ steps.get_version.outputs.version }}
          files: |
            _builds/**/*.zip
            _builds/**/*.tgz
            install-online.sh
            install-tarball.sh
            module.json
          tag_name: ${{ steps.get_version.outputs.version }}
