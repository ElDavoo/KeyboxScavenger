name: Build and Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

# Grant write access to repository contents so the workflow can create releases
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Make build script executable
        run: chmod +x ./build.sh || true

      - name: Build package
        run: |
          set -eux
          ./check-syntax.sh || true
          ./build.sh

      - name: Get version
        id: get_version
        run: |
          # Prefer the pushed tag when present, otherwise fall back to module.prop
          if echo "${GITHUB_REF:-}" | grep -q '^refs/tags/'; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(sed -n 's/^version=//p' module.prop)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: ${{ steps.get_version.outputs.version }}
          body: Automated release for ${{ steps.get_version.outputs.version }}
          files: |
            _builds/**/*.zip
            _builds/**/*.tgz
            bin/*.zip
            install-online.sh
            install-tarball.sh
            module.json
          tag_name: ${{ steps.get_version.outputs.version }}
